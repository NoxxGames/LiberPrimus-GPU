record_type: outguess_regression_manifest
manifest_id: outguess-regression-v1
description: Deterministic Stage 3V OutGuess regression harness with explicit synthetic controls and historical placeholders.
tool_required: true
allow_missing_tool: true
allow_missing_assets: true
expected_case_count_upper_bound: 16
cpu_only: true
cuda_enabled: false
no_solve_claim: true
generated_outputs_committed: false
default_command:
  extraction_args:
  - -r
  - '{input_path}'
  - '{output_path}'
cases:
