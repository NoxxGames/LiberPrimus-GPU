record_set_id: method-retirement-records-v0
schema: schemas/research/method-retirement-record-v0.schema.json
records:
  - record_type: method_retirement_record
    method_family_id: caesar_affine
    retired_status: deprioritised
    reason: Bounded Caesar/affine experiments were noisy under calibrated scoring.
    evidence: [Stage 3A-3J did not produce robust leads.]
    stages_supporting: [stage-3a-3j]
    reopen_conditions: [New source evidence constrains exact shift or affine parameters.]
    prohibited_expansions: [Broad reranking, larger shift grids, unsourced route variants.]
    notes: Keep as regression/null-control infrastructure.
  - record_type: method_retirement_record
    method_family_id: vigenere_lp_evidence_pack
    retired_status: deprioritised
    reason: Vigenere evidence packs were noisy and should not be expanded into dictionary search.
    evidence: [Stage 3A-3J Vigenere packs did not produce robust leads.]
    stages_supporting: [stage-3a-3j]
    reopen_conditions: [Exact promoted key and target span from public source.]
    prohibited_expansions: [Dictionary-scale keys, Discord-only phrases, unsourced motif lists.]
    notes: Known-solved Vigenere fixtures remain baselines.
  - record_type: method_retirement_record
    method_family_id: vigenere_historical_motif_pack
    retired_status: deprioritised
    reason: Historical motif pack was noisy without exact source-key evidence.
    evidence: [Bounded historical motif runs lacked strong calibrated candidates.]
    stages_supporting: [stage-3a-3j]
    reopen_conditions: [Historical source supplies exact key text and span.]
    prohibited_expansions: [Community motif fishing, dictionary-scale expansion.]
    notes: Treat as stopped unless new evidence appears.
  - record_type: method_retirement_record
    method_family_id: mersenne_perfect_number_probe
    retired_status: deprioritised
    reason: Tiny Mersenne/perfect-number probe was inconclusive and low priority.
    evidence: [No robust lead emerged from the bounded numeric probe.]
    stages_supporting: [stage-3a-3j]
    reopen_conditions: [Exact image/source evidence ties a page span to Mersenne or perfect numbers.]
    prohibited_expansions: [Broad number-family sweeps.]
    notes: Preserve as a lesson in source anchoring.
  - record_type: method_retirement_record
    method_family_id: cookie_hash_sha256_packs
    retired_status: deprioritised
    reason: Tried SHA-256 exact packs and the Stage 4G source-backed refresh had zero exact matches; expansion is blocked without explicit new strings.
    evidence: [Stage 3L found zero exact matches, Stage 3U found zero exact matches, Stage 4G found zero exact matches from 8 exact comparisons.]
    stages_supporting: [stage-3l, stage-3u, stage-4g]
    reopen_conditions: [Explicit signed/public/source-locked candidate string not already tested.]
    prohibited_expansions: [Fuzzy matching, partial hashes, dictionary search, hashcat, GPU cracking, additional algorithms without a manifest.]
    notes: Do not rerun cookie exact packs without newly source-locked exact candidate strings; exact SHA-256 remains an artefact hypothesis, not a solve claim.
  - record_type: method_retirement_record
    method_family_id: onion7_explicit_seed_pack
    retired_status: active_with_constraints
    reason: Stage 3S was inconclusive; Onion 7 observations stay useful but route expansion is blocked.
    evidence: [Stage 3S executed 72 candidates with inconclusive top confidence.]
    stages_supporting: [stage-3s]
    reopen_conditions: [New source constrains route, reset policy, or span.]
    prohibited_expansions: [Speculative Fibonacci, Mobius, spiral, or route variants beyond manifest evidence.]
    notes: Keep raw and derived Onion 7 values separated.
  - record_type: method_retirement_record
    method_family_id: outguess_regression_harness
    retired_status: deferred
    reason: Harness exists and Stage 4F prepared fixture source-lock metadata, but local tools/assets and expected-output controls remain unavailable.
    evidence: [Stage 3V produced missing-tool/missing-asset-safe harness outputs, Stage 4F prepared metadata-only fixture records.]
    stages_supporting: [stage-3v, stage-4f]
    reopen_conditions: [Source-locked historical OutGuess fixtures, local assets, expected-output controls, and local tool are available.]
    prohibited_expansions: [Broad stego scans, meaning inference from non-empty payloads without expected hash.]
    notes: Stage 4F source-locked metadata only; extraction remains deferred.
  - record_type: method_retirement_record
    method_family_id: cuda_gpu_acceleration
    retired_status: deferred
    reason: CUDA is intentionally delayed until CPU batch APIs, scorer contracts, parity tests, and benchmarks exist.
    evidence: [Project policy and Stage 3W anti-drift state keep CUDA deferred, Stage 4H added the CPU batch parity contract, Stage 4I added scoring semantics, Stage 4J added observation review gates, and Stage 4O added CPU batch adapter parity expectations without GPU code.]
    stages_supporting: [stage-3w, stage-4h, stage-4i, stage-4j, stage-4o]
    reopen_conditions: [Stage 4H CPU batch API, Stage 4I scorer consolidation, Stage 4J observation review gates, Stage 4O parity expectations, transform-and-score parity tests, and benchmark plan are complete.]
    prohibited_expansions: [GPU kernels without CPU reference, parity tests, and benchmark plan.]
    notes: First future CUDA target is batch transform-and-score parity; Stage 4H through Stage 4O did not implement CUDA.
  - record_type: method_retirement_record
    method_family_id: cpu_batch_transform_api
    retired_status: active_with_constraints
    reason: CPU batch infrastructure is active as the source of truth for future parity, but it must not become a broad experiment runner or hidden CUDA implementation.
    evidence: [Stage 4H ran only the synthetic smoke manifest and wrote a CUDA parity contract, and Stage 4O added solved-fixture-safe streams, 9 supported adapters, 2 missing/deferred adapter records, 8 CPU-only result records, and 8 parity expectations.]
    stages_supporting: [stage-4h, stage-4i, stage-4o]
    reopen_conditions: [A future stage adds transform adapters with synthetic or solved-fixture-safe tests, output hash expectations, score-summary compatibility, and unchanged transform semantics.]
    prohibited_expansions: [Broad unsolved-page campaigns, new transform families without manifests, GPU kernels, CUDA parity claims without matching CPU records, solved-baseline expected-output changes.]
    notes: CPU batch outputs are generated and ignored; committed summaries are aggregate-only and Stage 4O parity expectations are future CUDA reference checks.
  - record_type: method_retirement_record
    method_family_id: scoring_consolidation
    retired_status: active_with_constraints
    reason: Scoring infrastructure is active as triage metadata only and must not become solve evidence or a moving target for CUDA parity.
    evidence: [Stage 4I records finite confidence labels, compatibility mappings, Stage 3C calibration profile, calibration report, and CPU batch score compatibility.]
    stages_supporting: [stage-3c, stage-4i]
    reopen_conditions: [A future stage adds a scorer with committed scorer records, compatibility mapping, tests, calibration notes, and CPU batch compatibility checks.]
    prohibited_expansions: [New magic scorers, LLM or ML scoring, score labels that imply solved/plaintext_verified, CUDA scoring without CPU score-summary parity.]
    notes: High scores create review leads only and cannot validate plaintext.
  - record_type: method_retirement_record
    method_family_id: observation_review_workflow
    retired_status: active_with_constraints
    reason: Observation review is active infrastructure, but automatic or implied promotion of observations into seeds would recreate false-positive risk.
    evidence: [Stage 4J generated review decisions, promotion gates, quarantine records, path sanitisation, and stale-doc checks for committed observation families.]
    stages_supporting: [stage-4j]
    reopen_conditions: [A new observation family or promotion request has a source lock, explicit review state, and policy-backed promotion path.]
    prohibited_expansions: [Review-only seed use, visual meaning promotion without coordinates and accepted review, Discord-derived promotion without public corroboration, absolute local path commits.]
    notes: Negative controls can be used as controls without accepting them as true observations.
  - record_type: method_retirement_record
    method_family_id: source_lock_snapshots
    retired_status: active_with_constraints
    reason: Public source-lock snapshots are active reproducibility infrastructure, but unrestricted fetching or content mirroring would create copyright, provenance, and repository-hygiene risk.
    evidence: [Stage 4K records allowlisted public-source metadata, GitHub commit-addressed references, ignored local cache hashes, and explicit snapshot policies.]
    stages_supporting: [stage-4k]
    reopen_conditions: [A new public source is allowlisted, high-value, source-classified, copyright-reviewed, and bounded by snapshot policy.]
    prohibited_expansions: [Broad web crawling, full repository mirroring, raw Discord or private link fetching, committing binary/image/audio/font/archive artefacts, treating source locks as canonical truth.]
    notes: Stage 4K committed metadata and hashes only; cached fetched content remains ignored.
  - record_type: method_retirement_record
    method_family_id: observation_promotion_ledger
    retired_status: active_with_constraints
    reason: Promotion ledger work is active infrastructure, but promotion-readiness records must never be mistaken for experiment execution approval or solve evidence.
    evidence: [Stage 4L records 97 reviewed observation ledger entries, 115 blocker records, and 13 disabled manifest-readiness records with zero executable seed-ready promotions.]
    stages_supporting: [stage-4l]
    reopen_conditions: [A future manifest cites specific promotion-readiness records and passes source, review, coordinate, expected-output, and policy gates.]
    prohibited_expansions: [Executing manifests from readiness records, treating control-only observations as true claims, promoting visual readings without coordinates, promoting cookie work after zero exact matches without new source strings, running stego/audio tools without assets/toolchain/expected outputs.]
    notes: Ready_for_manifest means future planning readiness only; execution still requires a separate explicit stage.
  - record_type: method_retirement_record
    method_family_id: image_source_variant_compression_preflight
    retired_status: active_with_constraints
    reason: Image preflight is active infrastructure, but compression/star-like artefact metrics and screenshot-based numeric patterns are high false-positive risk without source variants and controls.
    evidence: [Stage 4M records 58 local LP image metadata/metric records and keeps the bigram/Fibonacci-421 observation blocked pending reproducible matrix and null controls.]
    stages_supporting: [stage-4m]
    reopen_conditions: [External source variants are source-locked in ignored cache, null/negative controls are declared, or a future bounded audit has exact reproducible inputs.]
    prohibited_expansions: [Hidden-message inference from metrics, broad image transform fishing, OCR or AI interpretation, image/stego extraction, raw image commits, generated visualisation commits, bigram audit execution without matrix regeneration and null controls.]
    notes: Stage 4M is metric-only preflight and does not promote visual or numeric-pattern observations to experiment seeds.
  - record_type: method_retirement_record
    method_family_id: stego_audio_positive_control_readiness
    retired_status: active_with_constraints
    reason: Stego/audio positive-control readiness is active infrastructure, but historical tool execution is blocked until assets, expected outputs, and toolchain availability are all recorded.
    evidence: [Stage 4N records 0 historical execution-ready fixtures, 8 blocked historical fixtures, and 2 synthetic-ready controls without running tools or committing raw artefacts.]
    stages_supporting: [stage-3v, stage-4f, stage-4n]
    reopen_conditions: [An explicit future execution stage has cached or immutable assets, expected-output hashes, positive/negative manifests, and verified toolchain records.]
    prohibited_expansions: [Running OutGuess/OpenPuff/MP3Stego during readiness stages, broad stego scans, committing image/audio/binary/font/archive artefacts, committing extracted payloads, treating source-only records as ready, or making hidden-message claims.]
    notes: Positive-control readiness means future verification can be checked; it is not extraction or evidence of a hidden payload.
  - record_type: method_retirement_record
    method_family_id: result_store_score_summary_unification
    retired_status: active_with_constraints
    reason: Result-store and score-summary unification is reporting infrastructure only; publishing generated result bodies or changing score semantics would weaken reproducibility.
    evidence: [Stage 4P records unified result and score-summary views while preserving Stage 4I labels and method-retirement states.]
    stages_supporting: [stage-2b, stage-3y, stage-4i, stage-4p]
    reopen_conditions: [A new committed result family or optional generated surface needs a normalized adapter and schema.]
    prohibited_expansions: [New scorer models, score labels outside Stage 4I, broad experiment reruns, generated result publication, SQLite commits, solve claims.]
    notes: Cross-stage reports are triage/comparison aids only and cannot promote a result to evidence.
  - record_type: method_retirement_record
    method_family_id: cpu_benchmark_parity_planning
    retired_status: active_with_constraints
    reason: CPU benchmark and parity planning is active infrastructure only; benchmark smoke diagnostics and readiness records are not performance claims or CUDA authorization.
    evidence: [Stage 4Q records 5 benchmark plan records, 14 parity readiness records, 3 CPU smoke records, 9 future CUDA planning-ready targets, 2 blocked targets, and 3 skipped non-targets.]
    stages_supporting: [stage-4q]
    reopen_conditions: [A future Stage 5A planning stage needs CPU benchmark gates, parity scaffolding constraints, or non-target validation before CUDA work.]
    prohibited_expansions: [CUDA implementation, GPU benchmarking, speedup claims, broad experiments, raw-data processing, generated-output commits, canonical corpus activation, page-boundary finalisation, solve claims.]
    notes: Stage 4Q diagnostics are planning records; generated benchmark outputs remain ignored.
  - record_type: method_retirement_record
    method_family_id: cuda_planning_parity_scaffolding
    retired_status: active_with_constraints
    reason: CUDA planning scaffolding is active infrastructure only; target readiness and parity scaffolds do not authorize CUDA source changes, GPU benchmarks, or speedup claims.
    evidence: [Stage 5A records 14 target-plan records, 9 ready planning targets, 2 blocked targets, 8 explicit non-targets, 9 parity scaffold records, and 10 satisfied implementation gates without modifying CUDA source.]
    stages_supporting: [stage-5a]
    reopen_conditions: [A later explicit Stage 5 CUDA parity harness or implementation stage cites Stage 5A records and remains raw-data-free, CPU-reference-backed, and parity-gated.]
    prohibited_expansions: [CUDA implementation in planning stages, new GPU kernels, GPU benchmarking, speedup claims before parity, broad unsolved campaigns, raw-data processing, website expansion before Stage 6, generated-output commits, solve claims.]
    notes: Stage 5A is a boundary and readiness ledger, not CUDA implementation.
  - record_type: method_retirement_record
    method_family_id: cuda_parity_harness_skeleton
    retired_status: active_with_constraints
    reason: CUDA parity harness work is active infrastructure only; it prepares future kernel parity expectations but does not authorize implementation, GPU benchmarking, or performance claims.
    evidence: [Stage 5B records 14 harness plans, 14 parity fixtures, 3 backend capability profiles, and 9 future-kernel matrix rows without modifying CUDA source or running GPU benchmarks.]
    stages_supporting: [stage-5b]
    reopen_conditions: [A later explicit Stage 5E or implementation stage cites the Stage 5B harness records, Stage 5D native CPU parity records, preserves CI no-GPU compatibility, and adds parity tests before any CUDA kernel work.]
    prohibited_expansions: [CUDA kernels in harness stages, CUDA source changes outside explicit implementation scope, GPU benchmarks, speedup claims, local 16GB GPU requirements, broad unsolved campaigns, raw-data processing, generated-output commits, solve claims.]
    notes: Stage 5B treats backend capability as optional planning metadata and keeps compatibility 8GB and CI no-GPU profiles first-class.
  - record_type: method_retirement_record
    method_family_id: cuda_build_device_detection
    retired_status: active_with_constraints
    reason: CUDA build and device-detection scaffolding is active infrastructure only; local toolchain/device records and smoke-build status do not authorize CUDA kernels, GPU benchmarks, speedup claims, or hardware requirements.
    evidence: [Stage 5C records 3 build profiles, 3 toolchain records, 3 device records, and 1 optional smoke-build record without running CUDA tests or GPU benchmarks.]
    stages_supporting: [stage-5c]
    reopen_conditions: [A later explicit backend or CUDA stage needs no-GPU-safe profile checks, optional local hardware metadata, or smoke-build readiness records before implementation.]
    prohibited_expansions: [CUDA kernels, cryptanalytic CUDA execution, GPU benchmarks, speedup or performance claims, required local GPU hardware, broad experiments, raw-data processing, website expansion, generated-output commits, codex-output commits, solve claims.]
    notes: The Stage 5C local smoke build attempt is readiness metadata only and failed in the local build integration; it is not parity evidence and no smoke executable was run.
  - record_type: method_retirement_record
    method_family_id: native_cpp_cpu_backend
    retired_status: active_with_constraints
    reason: Native C++ CPU backend work is active infrastructure only; it establishes deterministic CPU execution semantics for future parity and must not become CUDA implementation, broad execution, or performance marketing.
    evidence: [Stage 5D records 1 backend capability record, 5 threading records, 1 native/Python parity record, 1 diagnostic record, and matching one-thread/multi-thread/native/Python hashes over a synthetic fixture.]
    stages_supporting: [stage-5d]
    reopen_conditions: [A future stage needs additional native CPU adapters, solved-fixture-safe native parity, or CPU/native parity records for the first CUDA kernel contract.]
    prohibited_expansions: [CUDA kernels, CUDA source changes, GPU benchmarks, speedup claims, C++ launching Python worker scripts, broad experiments, raw-data processing, website expansion, generated-output commits, codex-output commits, solve claims.]
