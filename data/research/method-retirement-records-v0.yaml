  - record_type: method_retirement_record
    method_family_id: prime_minus_one_cuda_contract
    retired_status: active_with_constraints
    reason: Prime-minus-one CUDA contract preparation is active infrastructure only; it prepares a future synthetic-only kernel contract without authorizing CUDA execution, p56/full-p56 execution, scored experiments, benchmarks, generated-body publication, or method-status upgrades.
    evidence: [Stage 5Z records 2 contract records, 1 kernel ABI record, 1 host-runner contract record, 11 buffer contract records, 7 validation-vector records, 4 future parity plan records, 2 result-store compatibility records, 1 full-p56 blocker record, 6 scored-experiment deferral records, 1 implementation-readiness gate record, and 7 next-stage decision records.]
    stages_supporting: [stage-5w, stage-5x, stage-5y, stage-5z]
    reopen_conditions: [A later Stage 5AA-style synthetic implementation stage cites Stage 5Z contract records and keeps p56/full-p56, unsolved pages, benchmarks, generated bodies, and scored experiments disabled unless a later explicit prompt scopes them.]
    prohibited_expansions: [Native execution, CUDA execution in Stage 5Z, CUDA source modification in Stage 5Z, new kernels in Stage 5Z, native/CUDA CMake, GPU benchmarks, speedup claims, full p56 execution without committed token buffer, unsolved-page CUDA, generated-body publication, raw-data processing, method-status upgrades to solved, solve claims.]
    notes: Stage 5Z selected Stage 5AA prime-minus-one CUDA synthetic kernel implementation and parity as synthetic-only first.
  - record_type: method_retirement_record
    method_family_id: prime_minus_one_cuda_synthetic
    retired_status: active_with_constraints
    reason: Prime-minus-one CUDA synthetic parity is active infrastructure only; it proves one synthetic validation vector, and Stage 5AC reports that parity while preserving full-p56, unsolved-page, scored-experiment, benchmark, generated-body, and method-status blockers.
    evidence: [Stage 5AA records 1 kernel implementation record, 1 CUDA run record, 1 parity record, 1 device-subset audit record, 2 result-store preflight records, 2 p56/full-p56 blocker records, 6 scored-experiment deferral records, and 4 next-stage decision records; Stage 5AC records compact reporting metadata, bounded-p56 preflight, full-p56 blocker preservation, scored-experiment deferrals, doc-staleness validation, and 8 next-stage decision records.]
    stages_supporting: [stage-5w, stage-5x, stage-5y, stage-5z, stage-5aa, stage-5ac]
