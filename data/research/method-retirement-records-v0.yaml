  - record_type: method_retirement_record
    method_family_id: cuda_first_kernel_contract
    retired_status: active_with_constraints
    reason: First-kernel contract selection is active infrastructure only; it selects a future target and parity adapter but does not authorize broad CUDA implementation, GPU benchmarking, or performance claims.
    evidence: [Stage 5E selects shift_score_kernel/caesar_mod29 and maps Stage 5D native hashes; Stage 5F implements only that synthetic-only CUDA parity kernel and records no broad CUDA readiness; Stage 5G reports the synthetic parity surface and records CUDA-facing device-code subset compliance; Stage 5H defines the separate Gematria mod-29 shift_score contract and synthetic native fixture hash; Stage 5I prepares the Gematria CUDA-C ABI, validation vectors, and Stage 5J checklist without adding kernels.]
    stages_supporting: [stage-5e, stage-5h, stage-5i]
    reopen_conditions: [A future Stage 5J or later implementation/reporting stage cites the selected contract, Stage 5H Gematria mod-29 contract and native fixture hash, Stage 5I ABI/vector/checklist records, Stage 5D native parity adapter map, Stage 5F synthetic parity records, Stage 5G reporting/device-code audit records, Stage 5B harness and fixture records, no-GPU CI profile, and explicit scope.]
    prohibited_expansions: [Unscoped CUDA kernels, CUDA transforms beyond the selected synthetic-only contract, GPU benchmarks, speedup claims, raw-data processing, broad experiments, website expansion, generated-output commits, codex-output commits, solve claims.]
    notes: Stage 5F is a synthetic-only parity implementation and Stage 5G is reporting/hardening only; the selected target is still not broad CUDA implementation approval.
  - record_type: method_retirement_record
    method_family_id: native_candidate_batch_abi_conformance
    retired_status: active_with_constraints
    reason: Candidate Batch ABI native conformance is active infrastructure only; it proves shape and hash semantics without authorizing CUDA kernels, benchmarks, raw-data use, or original-family execution.
    evidence: [Stage 5V records 7 raw-data-free conformance fixtures, 3 Python reference output-token hashes, score-vector/top-k shape conformance, and compact result-store compatibility.]
    stages_supporting: [stage-5u, stage-5v]
    reopen_conditions: [A future Stage 5W or later native contract stage needs stream, key, affine, reverse, score-vector, top-k, or C++ adapter conformance before CUDA implementation.]
    prohibited_expansions: [CUDA execution, CUDA source changes, new kernels, GPU benchmarks, speedup claims, unsolved-page CUDA, generated-body publication, raw-data processing, method-status upgrades, solve claims.]
    notes: Stage 5V selected prime-minus-one stream native parity contract preparation next and left C++ adapter implementation deferred.
  - record_type: method_retirement_record
    method_family_id: prime_minus_one_native_reporting
    retired_status: active_with_constraints
    reason: Prime-minus-one native reporting is active infrastructure only; it integrates compact Stage 5X parity metadata and readiness gates but does not authorize execution, CUDA implementation, full-p56 processing, benchmarks, generated-body publication, or solve claims.
    evidence: [Stage 5Y records 3 parity report records, 3 result-store integration records, 3 score-summary integration records, 5 method-status impact records, 7 generated-body policy records, 1 full-p56 blocker preservation record, 1 CUDA contract readiness-gate record, 6 bounded scored-experiment readiness records, 9 guardrail records, and 10 next-stage decision records.]
    stages_supporting: [stage-5w, stage-5x, stage-5y]
    reopen_conditions: [A later Stage 5Z-style contract preparation stage cites Stage 5Y reporting/readiness records and keeps execution, kernels, and benchmarks disabled unless a later explicit implementation prompt scopes them.]
    prohibited_expansions: [Native parity execution, CUDA execution, CUDA source changes, new kernels, native/CUDA CMake, GPU benchmarks, speedup claims, full p56 execution without committed token buffer, unsolved-page CUDA, generated-body publication, raw-data processing, method-status upgrades to solved, solve claims.]
