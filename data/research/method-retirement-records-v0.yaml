    prohibited_expansions: [p56 CUDA execution in Stage 5AA, full p56 CUDA, unsolved-page CUDA, broad solved-fixture campaigns, scored experiments, GPU benchmarks, speedup claims, generated-body publication, raw-data processing, website expansion, method-status upgrades to solved, solve claims.]
    notes: Stage 5AC selected Stage 5AD bounded p56 CUDA parity run after the Stage 5AA synthetic hash matched and Stage 5AB doc-staleness checks passed.
  - record_type: method_retirement_record
    method_family_id: deterministic_image_analysis
    retired_status: active_with_constraints
    reason: Stage 4B visual observations are useful review inputs, but broad visual pareidolia and unannotated dot/braille/constellation readings remain high-risk false-positive classes.
    evidence: [Stage 4B negative-control records preserve braille, constellation, forced dot-value, cuneiform-as-fact, and geometry overlay failure modes.]
    stages_supporting: [stage-4b]
    reopen_conditions: [Stage 4C-style annotation supplies exact coordinates, ambiguity tables, source refs, and review status.]
    prohibited_expansions: [OCR or AI-derived page solves, unannotated dot/braille/constellation seeds, broad visual filter fishing, geometry or mirror overlay dumps without source lineage.]
    notes: Visual observations remain review-only and usable_as_experiment_seed=false until explicitly promoted.
  - record_type: method_retirement_record
    method_family_id: source_lock_visual_observation_intake
    retired_status: active_with_constraints
    reason: Source-lock and observation intake is active, but noisy public-link indexes and Deep Research leads must be filtered by allowlist, source class, privacy risk, and evidence strength.
    evidence: [Stage 4B promoted selected public sources while rejecting unsafe/noisy links and preserving negative controls.]
    stages_supporting: [stage-4b]
    reopen_conditions: [New public-source class or exact observation has a bounded validation path and documented privacy review.]
    prohibited_expansions: [Blind archive mirroring, private Discord or CDN link promotion, broad literature-key fishing, broad hash cracking, broad stego scans.]
    notes: Stage 4B is durable triage state, not a solve or experiment stage.
  - record_type: method_retirement_record
    method_family_id: cuneiform_dot_annotation_pack
    retired_status: active_with_constraints
    reason: Stage 4C creates review infrastructure, but visual readings remain unsafe as experiment seeds until exact coordinates, ordering, polarity, ambiguity, and human review are recorded.
    evidence: [Stage 4C annotation tasks keep cuneiform, dot, delimiter, braille, constellation, and negative-control motifs non-canonical and usable_as_experiment_seed=false.]
    stages_supporting: [stage-4c]
    reopen_conditions: [A later review stage promotes a specific annotated region with exact coordinates, accepted reading, rejected alternatives, confidence, and null controls.]
    prohibited_expansions: [Unannotated cuneiform seed packs, forced dot/binary seeds, braille or constellation seeds, OCR or AI-derived readings, visual meaning inference from generated overlays.]
    notes: Coordinates prove only region location, not cipher meaning.
  - record_type: method_retirement_record
    method_family_id: bounded_numeric_verifier_pack
    retired_status: active_with_constraints
    reason: Stage 4D numeric verification is allowed only as bounded no-fudge audit work; it must not become broad number-theory fishing.
    evidence: [Stage 4D records exact-claim skips, raw-value skips, delimiter metadata audits, dot ambiguity audits, and visual negative-control metrics without broadening route spaces.]
    stages_supporting: [stage-4d]
    reopen_conditions: [A later stage supplies exact source-locked values or accepted annotation records and a bounded manifest cap.]
    prohibited_expansions: [Nearest-prime adjustments, arbitrary +/-n tweaks, post-hoc row or column arithmetic, route expansion beyond manifest, fuzzy numeric matching, broad hash or stego work.]
    notes: No-fudge policy keeps raw and derived values separate and requires formulas/sources for every derived value.
  - record_type: method_retirement_record
    method_family_id: source_delta_audit
    retired_status: active_with_constraints
    reason: Source-delta auditing is useful only as selected metadata triage; broad external mirrors and binary artefact commits would create provenance and repository-hygiene risk.
    evidence: [Stage 4E inspected cicada-solvers/iddqd tree metadata, selected high-value path categories, and queued disabled future source-lock work.]
    stages_supporting: [stage-4e]
    reopen_conditions: [A future explicit source-lock stage needs selected paths, hashes, dimensions, fixture provenance, or deterministic comparison manifests.]
    prohibited_expansions: [Full repository mirroring, raw binary/image/audio/font commits, broad web crawling, image-stego extraction, OCR or AI interpretation, compression artefact solve claims.]
    notes: Image compression artefacts and source variants remain future-preflight observations only.
  - record_type: method_retirement_record
    method_family_id: stego_audio_fixture_source_lock
    retired_status: active_with_constraints
    reason: Historical stego/audio fixture preparation is useful only as source-lock metadata until toolchains, assets, and expected-output controls are explicitly available.
    evidence: [Stage 4F prepared fixture source records, source health records, toolchain requirements, and disabled future manifests.]
