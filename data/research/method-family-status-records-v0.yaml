record_set_id: method-family-status-records-v0
schema: schemas/research/method-family-status-record-v0.schema.json
records:
  - record_type: method_family_status_record
    method_family_id: caesar_affine
    name: Caesar and affine shifts
    status: noisy
    evidence_summary: Stage 3A-3J bounded runs did not produce robust calibrated leads.
    completed_stage_refs: [stage-3a-3j]
    reopen_conditions: [New public source evidence identifies a specific shift or affine parameter family.]
    stop_conditions: [Do not widen shift grids or rerank without new source evidence.]
    next_action: Keep as solved-baseline and null-control infrastructure only.
    solve_claim: false
    notes: Noisy, not retired from regression use.
  - record_type: method_family_status_record
    method_family_id: reverse_reranked_affine
    name: Reverse and reranked affine/Caesar variants
    status: noisy
    evidence_summary: Reverse and reranking variants remained noisy.
    completed_stage_refs: [stage-3a-3j]
    reopen_conditions: [Exact source note specifies reversal or reranking semantics.]
    stop_conditions: [Do not iterate route/order variants without source anchor.]
    next_action: Preserve as negative-control comparison.
    solve_claim: false
    notes: Avoid variant fishing.
  - record_type: method_family_status_record
    method_family_id: vigenere_tiny_motif
    name: Small motif Vigenere
    status: noisy
    evidence_summary: Small motif keys did not generate strong candidates.
    completed_stage_refs: [stage-3a-3j]
    reopen_conditions: [Source-locked key or exact motif-to-key derivation appears.]
    stop_conditions: [Do not expand key lists from vibes, Discord-only claims, or dictionaries.]
    next_action: Deprioritise.
    solve_claim: false
    notes: Keep known-solved Vigenere fixtures separate.
  - record_type: method_family_status_record
    method_family_id: vigenere_lp_evidence_pack
    name: LP evidence Vigenere pack
    status: noisy
    evidence_summary: LP-evidence key pack remained noisy under calibrated scoring.
    completed_stage_refs: [stage-3a-3j]
    reopen_conditions: [A promoted source record supplies exact key text or boundary.]
    stop_conditions: [No dictionary-scale expansion.]
    next_action: Deprioritise.
    solve_claim: false
    notes: Exact-key solved fixtures remain active as regression tests.
  - record_type: method_family_status_record
    method_family_id: vigenere_historical_motif_pack
    name: Historical motif Vigenere pack
    status: noisy
    evidence_summary: Historical motif pack did not produce robust leads.
    completed_stage_refs: [stage-3a-3j]
    reopen_conditions: [Historical source supplies exact key and span.]
    stop_conditions: [Do not treat community motif lists as key authority.]
    next_action: Keep stopped.
    solve_claim: false
    notes: No broad Vigenere campaign.
  - record_type: method_family_status_record
    method_family_id: p56_local_prime_offsets
    name: p56-local prime offset sweeps
    status: inconclusive
    evidence_summary: Local prime-offset sweeps were noisy/inconclusive.
    completed_stage_refs: [stage-3a-3j]
    reopen_conditions: [Promoted source evidence identifies exact offset, sequence, or span.]
    stop_conditions: [Do not broaden offset windows without a source anchor.]
    next_action: Low priority.
    solve_claim: false
    notes: p56 known-solved fixtures remain regression baselines.
  - record_type: method_family_status_record
    method_family_id: reset_advance_ablation
    name: Reset and advance ablation
    status: infrastructure_only
    evidence_summary: Experiment results were noisy, but the ablation framework is useful for future bounded checks.
    completed_stage_refs: [stage-3a-3j]
    reopen_conditions: [Future manifest has exact reset or separator policy to verify.]
    stop_conditions: [Do not run broad reset/advance matrices.]
    next_action: Preserve infrastructure.
    solve_claim: false
    notes: Useful for controlled comparisons only.
  - record_type: method_family_status_record
    method_family_id: mersenne_perfect_number_probe
    name: Mersenne/perfect-number tiny probe
    status: inconclusive
    evidence_summary: Tiny numeric probe was inconclusive and low priority.
    completed_stage_refs: [stage-3a-3j]
    reopen_conditions: [Image/source evidence explicitly links the page to Mersenne or perfect numbers.]
    stop_conditions: [Do not expand numeric families without source evidence.]
    next_action: Defer.
    solve_claim: false
    notes: Keep as negative-control lesson.
  - record_type: method_family_status_record
    method_family_id: onion7_explicit_seed_pack
    name: Onion 7 explicit seed pack
    status: inconclusive
    evidence_summary: Stage 3S ran 72 manifest-bounded candidates; top confidence was inconclusive.
    completed_stage_refs: [stage-3s]
    reopen_conditions: [New source observation constrains route, reset, or target span.]
    stop_conditions: [Do not add speculative Fibonacci, Mobius, spiral, or route variants beyond manifest evidence.]
    next_action: Preserve source observation and avoid widening.
    solve_claim: false
    notes: Onion 7 numeric tables remain source-supported observations.
  - record_type: method_family_status_record
    method_family_id: cookie_hash_sha256_packs
    name: Cookie SHA-256 preimage packs
    status: negative
    evidence_summary: Stage 3L broader initial packs, Stage 3U signed/public exact pack, and Stage 4G source-backed refresh all produced zero exact SHA-256 matches.
    completed_stage_refs: [stage-3l, stage-3u, stage-4g]
    reopen_conditions: [New exact public/source-locked candidate string not already covered by Stage 3L, Stage 3U, or Stage 4G.]
    stop_conditions: [No fuzzy, partial, dictionary-scale, hashcat, GPU, or non-SHA-256 broadening without explicit new source and explicit instruction.]
    next_action: Deprioritise cookie SHA-256 exact packs unless new exact source strings appear.
    solve_claim: false
    notes: Stage 4G tested 4 source-backed raw strings for 8 SHA-256 comparisons and found 0 exact matches; an exact match would be an artefact lead only, not a solve.
  - record_type: method_family_status_record
    method_family_id: gp_rune_claim_verifier
    name: GP/rune claim verifier
    status: active
    evidence_summary: Stage 3T verified 23 of 25 exact claims and quarantined unsupported/malformed claims.
    completed_stage_refs: [stage-3t]
    reopen_conditions: [More exact promoted claims with locked source spans.]
    stop_conditions: [No neighbouring-span search to force claims true.]
    next_action: Keep available for exact claim verification.
    solve_claim: false
    notes: Evidence-hygiene tool, not a search.
  - record_type: method_family_status_record
    method_family_id: deterministic_image_analysis
    name: Deterministic image analysis
    status: infrastructure_only
    evidence_summary: Image dimensions and deterministic observations support review, not plaintext claims.
    completed_stage_refs: [stage-3k-3q]
    reopen_conditions: [Source-locked artefact metadata or exact visual observation requires deterministic verification.]
    stop_conditions: [No OCR, AI/ML, pareidolia, or broad image interpretation as source truth.]
    next_action: Maintain review-aid tooling.
    solve_claim: false
    notes: Raw page images remain ignored.
  - record_type: method_family_status_record
    method_family_id: image_transform_suite
    name: Image transform suite
    status: infrastructure_only
    evidence_summary: Deterministic transforms are useful for review but do not establish hidden-message evidence alone.
    completed_stage_refs: [stage-3p]
    reopen_conditions: [Specific manifest lists exact artefact and transform.]
    stop_conditions: [Do not run broad filter sweeps.]
    next_action: Keep bounded.
    solve_claim: false
    notes: No visual solve claims.
  - record_type: method_family_status_record
    method_family_id: discord_ingestion_review
    name: Discord ingestion and review
    status: infrastructure_only
    evidence_summary: Stage 3N-3Q created raw-log-free review infrastructure for local lead discovery.
    completed_stage_refs: [stage-3n, stage-3q]
    reopen_conditions: [Need for redacted local review bundles under existing privacy policy.]
    stop_conditions: [Do not publish raw logs, usernames, message IDs, or private URLs.]
    next_action: Keep as private/ignored discovery layer.
    solve_claim: false
    notes: Discord-only claims are not facts.
  - record_type: method_family_status_record
    method_family_id: discord_lead_promotion
    name: Discord lead promotion
    status: active
    evidence_summary: Stage 3R promoted only public-source-corroborated leads and preserved negative controls.
    completed_stage_refs: [stage-3r]
    reopen_conditions: [New redacted lead maps to public URL, exact artefact, or pinned repository record.]
    stop_conditions: [Quarantine Discord-only, private, identity-bearing, speculative, or unsafe claims.]
    next_action: Reuse policy when new source-review work appears.
    solve_claim: false
    notes: Public-source corroboration decides promotion.
  - record_type: method_family_status_record
    method_family_id: outguess_regression_harness
    name: OutGuess regression harness
    status: infrastructure_only
    evidence_summary: Stage 3V added a deterministic harness and Stage 4F prepared historical fixture source-lock metadata; local execution still needs tools/assets.
    completed_stage_refs: [stage-3v, stage-4f]
    reopen_conditions: [Source-locked historical fixtures, local artefacts, expected-output controls, and local OutGuess tool are available.]
    stop_conditions: [Do not run broad stego scans or infer meaning from non-empty payloads without expected hash.]
    next_action: Keep execution deferred until an explicit future tool/assets stage.
    solve_claim: false
    notes: Missing tool/assets are valid skips; Stage 4F records metadata only.
  - record_type: method_family_status_record
    method_family_id: source_lock_visual_observation_intake
    name: Website-derived source locks and visual observation intake
    status: active
    evidence_summary: Stage 4B promotes allowlisted public sources and preserves visual/numeric observations as review-only records with ambiguity and negative controls.
    completed_stage_refs: [stage-4b]
    reopen_conditions: [New redacted Deep Research review or source index item maps to an allowlisted public source class or exact observation record.]
    stop_conditions: [Do not mirror noisy link indexes blindly, promote unsafe/private links, or convert unannotated visual observations into experiment seeds.]
    next_action: Stage 4C annotation records complete; use them as review infrastructure before any bounded numeric verifier work.
    solve_claim: false
    notes: This branch is active for source locks and observation review, not cryptanalytic execution.
  - record_type: method_family_status_record
    method_family_id: cuneiform_dot_annotation_pack
    name: Cuneiform and dot annotation pack
    status: infrastructure_only
    evidence_summary: Stage 4C turns cuneiform/base-60, mirrored delimiter, dot ambiguity, and visual negative-control leads into coordinate-review tasks without deciding meaning.
    completed_stage_refs: [stage-4c]
    reopen_conditions: [Human annotations supply exact coordinates, ambiguity tables, source refs, and review status for a bounded follow-up.]
    stop_conditions: [Do not infer cuneiform meanings, force dot 13/31 readings, promote braille or constellation motifs, or execute image-derived seeds from unreviewed tasks.]
    next_action: Stage 4D bounded numeric verifier pack can use only source-locked, reviewable numeric claims and must keep visual-derived seeds disabled unless later promoted.
    solve_claim: false
    notes: Coordinates and readings are separate evidence layers.
  - record_type: method_family_status_record
    method_family_id: bounded_numeric_verifier_pack
    name: Bounded numeric verifier pack
    status: active
    evidence_summary: Stage 4D runs only source-backed numeric and metadata audits under no-fudge rules, with skips/deferred records when exact spans, raw values, or accepted annotations are missing.
    completed_stage_refs: [stage-4d]
    reopen_conditions: [New source-locked exact numeric claims, raw number-square values, or reviewed annotations are available under a bounded manifest cap.]
    stop_conditions: [Do not broaden route/value spaces, violate no-fudge rules, add nearest-prime or +/-n adjustments, rerun cookie packs without newly source-locked exact strings, or run cuneiform-derived seeds from unaccepted annotations.]
    next_action: Preserve no-fudge audit infrastructure; Stage 4H CPU batch API work is next.
    solve_claim: false
    notes: Delimiter and dot outputs are audit metadata and negative-control measurements, not plaintext candidates.
  - record_type: method_family_status_record
    method_family_id: source_delta_audit
    name: Source-lock delta audit and image/stego provenance preparation
    status: active
    evidence_summary: Stage 4E records metadata for selected public cicada-solvers/iddqd paths and queues future LP image variant, compression-artifact, lp_outguessed, and audio fixture source-lock work without mirroring raw artefacts.
    completed_stage_refs: [stage-4e]
    reopen_conditions: [A future source-lock stage needs selected public repository path metadata, fixture provenance, or deterministic source-variant comparison inputs.]
    stop_conditions: [Do not blind-mirror external repositories, commit binaries/images/audio/fonts, infer meaning from compression artefacts, run stego tools, or treat source deltas as canonical corpus.]
    next_action: Stage 4F fixture source-locking used the selected lp_outguessed and audio candidate metadata; future source-delta work should remain selected and metadata-only.
    solve_claim: false
    notes: Source-delta records are metadata and backlog, not experiments or solves.
  - record_type: method_family_status_record
    method_family_id: stego_audio_fixture_source_lock
    name: Historical stego/audio fixture source-locking
    status: infrastructure_only
    evidence_summary: Stage 4F records OutGuess/audio fixture source metadata, source health, toolchain requirements, and disabled future manifests without running tools or downloading raw artefacts.
    completed_stage_refs: [stage-4f]
    reopen_conditions: [A future explicit fixture execution stage has source-locked assets, expected-output controls, and documented toolchain availability.]
    stop_conditions: [Do not run OutGuess, OpenPuff, MP3Stego, spectrograms, hexdump/string scans against binary assets, or commit raw image/audio/binary/font artefacts during source-lock stages.]
    next_action: Stego/audio execution remains deferred; Stage 4H CPU batch API work is next.
    solve_claim: false
    notes: Fixture records are provenance metadata only, not evidence of hidden payloads.
  - record_type: method_family_status_record
    method_family_id: cpu_batch_transform_api
    name: CPU batch transform API and parity contract
    status: infrastructure_only
    evidence_summary: Stage 4H extracted a CPU-only batch transform API and Stage 4O expanded solved-fixture-safe adapter coverage to 9 supported adapters, 2 missing/deferred adapters, 8 CPU-only candidates, 8 result records, 8 parity expectations, and 8 score-compatible outputs without adding GPU code.
    completed_stage_refs: [stage-4h, stage-4i, stage-4o]
    reopen_conditions: [New transform adapters include synthetic or solved-fixture-safe batch tests, deterministic output hashes, score-summary compatibility, and unchanged CPU registry semantics.]
    stop_conditions: [Do not implement GPU code, broaden transform families, alter solved-baseline expected outputs, or trust CUDA outputs until Stage 4O parity expectations have matching CPU/CUDA parity tests.]
    next_action: Stage 4P result-store and score-summary unification should consume Stage 4O result, parity, and scoring compatibility records without changing transform semantics.
    solve_claim: false
    notes: CPU batch records are the future CUDA reference contract; Stage 4O generated result records remain ignored and committed summaries are aggregate-only.
  - record_type: method_family_status_record
    method_family_id: scoring_consolidation
    name: Scorer consolidation and calibration report
    status: infrastructure_only
    evidence_summary: Stage 4I consolidated existing minimal-triage scoring, Stage 3C calibration labels, confidence-label vocabulary, compatibility mappings, calibration-profile records, and CPU batch score-summary compatibility.
    completed_stage_refs: [stage-3c, stage-4h, stage-4i]
    reopen_conditions: [New scorer or scoring adapter includes scorer records, confidence-label mapping, tests, calibration notes, and CPU batch compatibility checks.]
    stop_conditions: [Do not invent new magic scorers, use scores as solve evidence, change old confidence labels without compatibility mapping, or trust CUDA scores before CPU score-summary parity passes.]
    next_action: Stage 4J observation review workflow hardening can rely on scoring labels as triage-only metadata.
    solve_claim: false
    notes: Scoring is a review-prioritisation aid only; labels cannot mean solved or plaintext_verified.
  - record_type: method_family_status_record
    method_family_id: observation_review_workflow
    name: Observation review workflow and promotion gates
    status: infrastructure_only
    evidence_summary: Stage 4J consolidated committed observation families into explicit review decisions, promotion gate records, quarantine records, and path/doc freshness checks.
    completed_stage_refs: [stage-4j]
    reopen_conditions: [New observation families, promotion request types, or source-lock snapshots require review-state mapping and policy validation.]
    stop_conditions: [Do not let review-only observations become experiment seeds, promote visual meaning without coordinates and accepted review, promote Discord-derived leads without public corroboration, or commit absolute local paths.]
    next_action: Use the Stage 4J policy and CLI before Stage 4K allowlisted public source-lock snapshots promote any new records.
    solve_claim: false
    notes: Observation records are triage inputs until accepted and explicitly promoted; negative controls remain useful as controls without truth acceptance.
  - record_type: method_family_status_record
    method_family_id: source_lock_snapshots
    name: Allowlisted public source-lock snapshots
    status: active
    evidence_summary: Stage 4K locks selected public-source metadata, GitHub commit-addressed references, fetch records, copyright notes, and explicit snapshot policies without mirroring raw artefacts.
    completed_stage_refs: [stage-4b, stage-4e, stage-4f, stage-4j, stage-4k]
    reopen_conditions: [A new allowlisted public source has clear provenance value, source class, copyright note, and bounded retrieval policy.]
    stop_conditions: [Do not broad crawl, blind-mirror repositories, commit binaries/images/audio/fonts/archives, fetch raw Discord/private links, or treat source locks as canonical truth.]
    next_action: Use source-lock snapshot records as reproducibility inputs for future reviewed promotion and source-variant preflight work.
    solve_claim: false
    notes: Source locks strengthen reproducibility and source health only; they are not solve evidence and do not activate the canonical corpus.
  - record_type: method_family_status_record
    method_family_id: observation_promotion_ledger
    name: Reviewed observation promotion ledger
    status: infrastructure_only
    evidence_summary: Stage 4L joins Stage 4J review decisions with Stage 4K source-lock records and records ready, blocked, deferred, quarantined, source-reference-only, and control-only states without executing manifests.
    completed_stage_refs: [stage-4j, stage-4k, stage-4l]
    reopen_conditions: [A future stage proposes manifest inputs that cite explicit promotion-readiness records and pass all promotion gates.]
    stop_conditions: [Do not treat ready_for_manifest as execution approval, use control-only observations as truth claims, promote cuneiform or dot readings without coordinates and accepted review, or promote cookie/stego/audio work while required source/tool/output blockers remain.]
    next_action: Stage 4M image source-variant and compression preflight can consume source-reference and control-only readiness records without interpreting artefacts as evidence.
    solve_claim: false
    notes: Stage 4L produced zero executable seed-ready observations; the ledger is a gate, not an experiment runner.
  - record_type: method_family_status_record
    method_family_id: image_source_variant_compression_preflight
    name: Image source-variant and compression preflight
    status: infrastructure_only
    evidence_summary: Stage 4M records local LP page-image metadata, deterministic compression metrics, source-variant readiness, review-only artifact candidates, and blocked bigram/Fibonacci-421 readiness without interpreting images or executing experiments.
    completed_stage_refs: [stage-4e, stage-4l, stage-4m]
    reopen_conditions: [External source-variant image bytes are source-locked in ignored cache, or a future bounded audit has exact reproducible matrix inputs and null-control policy.]
    stop_conditions: [Do not infer hidden-message evidence from metrics, commit raw image files or generated visualisations, promote image artefact observations as seeds, run OCR/AI/ML/stego extraction, or execute the bigram/Fibonacci audit without reproducible matrix and null controls.]
    next_action: Stage 4N OutGuess/audio positive-control completion remains separate from image-source preflight and must preserve expected-output controls.
    solve_claim: false
    notes: Compression/star-like artefacts and numeric pattern screenshots are review-only until controlled against source variants and nulls.
  - record_type: method_family_status_record
    method_family_id: stego_audio_positive_control_readiness
    name: Stego/audio positive-control readiness
    status: infrastructure_only
    evidence_summary: Stage 4N records historical OutGuess/audio fixture readiness, ignored-cache policy, expected-output requirements, toolchain availability, and synthetic controls without executing tools or committing artefacts.
    completed_stage_refs: [stage-3v, stage-4f, stage-4k, stage-4l, stage-4n]
    reopen_conditions: [A future explicit execution stage has cached or immutable assets, exact expected-output hashes, documented toolchain availability, and bounded positive/negative manifests.]
    stop_conditions: [Do not run historical stego/audio tools, commit raw artefacts or extracted payloads, treat source-only metadata as execution-ready, skip expected-output controls, or use positive-control readiness as solve evidence.]
    next_action: Keep historical stego/audio execution deferred while Stage 4P unifies result-store and score-summary records.
    solve_claim: false
    notes: Synthetic controls can be readiness-complete without historical artefacts; historical fixtures remain blocked until asset, expected-output, and toolchain blockers are cleared.
  - record_type: method_family_status_record
    method_family_id: result_store_score_summary_unification
    name: Result-store and score-summary unification
    status: infrastructure_only
    evidence_summary: Stage 4P normalizes committed summaries and optional ignored generated result surfaces into unified result records, Stage 4I-compatible score summaries, method-status joins, and a deterministic cross-stage report.
    completed_stage_refs: [stage-2b, stage-3y, stage-4i, stage-4o, stage-4p]
    reopen_conditions: [A future stage adds a new result family, score-summary surface, method-status ledger, or parity-report output that needs cross-stage comparability.]
    stop_conditions: [Do not execute experiments, invent scorer semantics, publish generated result records, import SQLite databases, or reinterpret noisy/negative/inconclusive records as solve evidence.]
    next_action: Use Stage 4P unified surfaces as reporting inputs for Stage 4Q CPU benchmark and parity planning.
    solve_claim: false
    notes: Missing optional generated outputs are explicit warnings, not silent omissions; generated unified JSON/JSONL records remain ignored.
  - record_type: method_family_status_record
    method_family_id: cuda_gpu_acceleration
    name: CUDA/GPU acceleration
    status: deferred
    evidence_summary: CUDA remains deferred; Stage 4H provides a CPU batch parity contract, Stage 4I provides scoring semantics, Stage 4J closes observation review gates, Stage 4K improves source-lock reproducibility, Stage 4L adds the promotion ledger, Stage 4M adds image preflight records, Stage 4N records stego/audio readiness blockers, and Stage 4O adds CPU batch adapter parity expectations, but parity tests and benchmarks are still required before GPU kernels are trusted.
    completed_stage_refs: [stage-0a-0e, stage-2a-2j, stage-3w, stage-4h, stage-4i, stage-4j, stage-4k, stage-4l, stage-4m, stage-4n, stage-4o]
    reopen_conditions: [CPU batch transform API, scorer consolidation, observation-review gates, source-lock reproducibility records, promotion-ledger records, image-preflight controls, positive-control readiness records, Stage 4O parity expectations, transform-and-score parity tests, and benchmark plan are complete.]
    stop_conditions: [No GPU kernels before CPU reference behaviour and parity tests.]
    next_action: First future CUDA target remains batch transform-and-score parity after Stage 4P result-store/score-summary unification and explicit CUDA planning.
    solve_claim: false
    notes: Existing CUDA is scaffold/smoke infrastructure only unless code says otherwise; Stage 4H through Stage 4O did not add CUDA code.
