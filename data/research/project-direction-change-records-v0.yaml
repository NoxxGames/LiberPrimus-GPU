record_set_id: project-direction-change-records-v0
schema: schemas/research/project-direction-change-record-v0.schema.json
records:
  - record_type: project_direction_change_record
    change_id: cpu-before-cuda
    date_or_stage: stage-0a-through-stage-3w
    previous_direction: GPU cryptanalysis ambition.
    new_direction: CPU reference implementations, parity plans, and benchmark requirements before CUDA implementation.
    reason: Correctness and provenance are prerequisites for meaningful acceleration.
    source: Original GPU research report and project policy.
    affected_docs: [CUDA_NOTES.md, AGENTS.md, ROADMAP.md, docs/roadmap/staged-plan.md]
    notes: CUDA remains deferred.
  - record_type: project_direction_change_record
    change_id: broad-search-to-bounded-manifests
    date_or_stage: stage-2j
    previous_direction: Potential broad local method runs.
    new_direction: Operator-policy-bounded manifests with stop conditions and ignored outputs.
    reason: Prevent uncontrolled experiments and preserve reproducibility.
    source: CPU method/backlog report and Stage 2J policy.
    affected_docs: [EXPERIMENTS.md, TESTING.md, docs/roadmap/staged-plan.md]
    notes: New experiments require manifests and policy checks.
  - record_type: project_direction_change_record
    change_id: discord-to-lead-discovery-only
    date_or_stage: stage-3r
    previous_direction: Discord bundle review as raw local research context.
    new_direction: Discord-derived leads are hypotheses until corroborated by public sources or exact artefacts.
    reason: Privacy and evidence hygiene require public-source promotion only.
    source: Discord corroboration and triage reports.
    affected_docs: [AGENTS.md, EXPERIMENTS.md, docs/roadmap/staged-plan.md]
    notes: Raw logs remain ignored and uncommitted.
  - record_type: project_direction_change_record
    change_id: visual-review-not-source-truth
    date_or_stage: stage-3k-through-stage-3q
    previous_direction: Visual observations could tempt interpretation-heavy follow-up.
    new_direction: Deterministic image observations are review aids unless source-locked and exact.
    reason: Avoid OCR/AI/pareidolia-driven source claims.
    source: Archive/image/onion research report.
    affected_docs: [CIPHER_CATALOG.md, EXPERIMENTS.md, docs/roadmap/staged-plan.md]
    notes: Raw page images remain ignored.
  - record_type: project_direction_change_record
    change_id: consolidation-before-new-experiments
    date_or_stage: stage-3w-through-stage-3y
    previous_direction: Continue new post-Discord experiments.
    new_direction: Consolidate persistent docs, modularise CLI, and record method retirement before new experiments.
    reason: Independent review found context drift and accumulated negative/noisy method history.
    source: Independent project review.
    affected_docs: [STATUS.md, ROADMAP.md, AGENTS.md, docs/roadmap/staged-plan.md]
    notes: Stage 3Z should improve newcomer/source-of-truth maps.
  - record_type: project_direction_change_record
    change_id: stage3z-stage4-discord-bundle-priority
    date_or_stage: stage-3z
    previous_direction: Stage 4A CPU batch transform API extraction.
    new_direction: Stage 4A full Discord research-bundle extraction for Deep Research, with CPU batch API deferred to later Stage 4E or equivalent.
    reason: User wants the full Discord logs converted into a Deep-Research-friendly, redacted, image-aware bundle after Stage 3 consolidation.
    source: User direction after Stage 3Y and Discord website review.
    affected_docs: [docs/roadmap/staged-plan.md, ROADMAP.md, docs/onboarding/deep-research-handoff-map.md, AGENTS.md]
    notes: CPU batch API remains planned, not cancelled.
  - record_type: project_direction_change_record
    change_id: stage4b-source-lock-visual-intake-priority
    date_or_stage: stage-4b
    previous_direction: Move from Stage 4A redacted Discord research-bundle generation toward later CPU batch API work.
    new_direction: Promote high-value public sources, add review-only visual/numeric observations, preserve negative controls, and perform cuneiform/dot annotation before any related experiment execution.
    reason: The Stage 4A Discord Research-Bundle Review found that source provenance, ambiguity, and false-positive controls are prerequisites for safe follow-up.
    source: Stage 4A Discord Research-Bundle Review and user Stage 4B direction.
    affected_docs: [docs/roadmap/staged-plan.md, ROADMAP.md, STATUS.md, AGENTS.md, EXPERIMENTS.md, CIPHER_CATALOG.md]
    notes: CPU batch API remains planned for Stage 4E; broad search, hash, stego, and visual pareidolia expansions remain deferred or prohibited.
  - record_type: project_direction_change_record
    change_id: stage4c-bounded-numeric-verifier-next
    date_or_stage: stage-4c
    previous_direction: Stage 4D OutGuess/audio historical fixture source-locking.
    new_direction: Stage 4D bounded numeric verifier pack, with OutGuess/audio fixture source-locking deferred to later Stage 4E or equivalent.
    reason: Stage 4B and Stage 4C created source-locked numeric and visual-review records; the next safe step is bounded verification of numeric claims while visual-derived seeds remain disabled.
    source: User Stage 4C direction and Stage 4C annotation policy.
    affected_docs: [docs/roadmap/staged-plan.md, ROADMAP.md, STATUS.md, AGENTS.md, EXPERIMENTS.md, CIPHER_CATALOG.md]
    notes: CPU batch API and scorer consolidation remain planned later, not cancelled.
  - record_type: project_direction_change_record
    change_id: stage4d-cookie-refresh-next
    date_or_stage: stage-4d
    previous_direction: Stage 4E OutGuess/audio historical fixture source-locking.
    new_direction: Stage 4E cookie exact-candidate refresh, with OutGuess/audio fixture work and cicada-solvers/iddqd source-lock delta audit kept as later explicit stages.
    reason: Stage 4D deferred cookie pack v2 by policy; the next bounded source-backed step is to refresh exact cookie candidates without broad hash cracking.
    source: User Stage 4D direction and Stage 4D no-fudge verifier results.
    affected_docs: [docs/roadmap/staged-plan.md, ROADMAP.md, STATUS.md, AGENTS.md, EXPERIMENTS.md, CIPHER_CATALOG.md]
    notes: The cicada-solvers/iddqd repository is noted as a future source-lock/delta-audit candidate only and was not processed in Stage 4D.
  - record_type: project_direction_change_record
    change_id: stage4e-iddqd-source-delta-priority
    date_or_stage: stage-4e
    previous_direction: Stage 4E cookie exact-candidate refresh.
    new_direction: Stage 4E cicada-solvers/iddqd source-lock delta audit, with Stage 4F selected as historical OutGuess/audio fixture source-locking based on the source tree findings.
    reason: User explicitly prioritized the cicada-solvers/iddqd source-delta audit and the tree exposed high-value lp_outguessed and audio fixture candidate paths that should be source-locked before stego/audio regression work.
    source: User Stage 4E direction and Stage 4E remote tree audit.
    affected_docs: [docs/roadmap/staged-plan.md, ROADMAP.md, STATUS.md, AGENTS.md, EXPERIMENTS.md, CIPHER_CATALOG.md]
    notes: Cookie exact-candidate refresh remains planned later and must still avoid broad hash cracking.
  - record_type: project_direction_change_record
    change_id: stage5ab-doc-staleness-quality-gate
    date_or_stage: stage-5ab
    previous_direction: Continue directly from Stage 5AA synthetic CUDA parity into the next implementation follow-up while operational Markdown still contained stale current-state claims.
    new_direction: Repair stale operational Markdown first, add source-of-truth driven document staleness checks, then select Stage 5AC from the Stage 5AA outcome after the quality gate.
    reason: Stale current/next-stage claims and brittle CUDA-boundary wording can mislead operators and future Codex prompts.
    source: User Stage 5AB direction and Stage 5AB staleness scan.
    affected_docs: [README.md, STATUS.md, ROADMAP.md, AGENTS.md, CUDA_NOTES.md, docs/roadmap/staged-plan.md, docs/onboarding/start-here.md]
    notes: Stage 5AB is process-quality infrastructure only and does not authorize CUDA execution, native execution, benchmarks, scored experiments, website expansion, generated-output publication, method-status upgrades, or solve claims.
  - record_type: project_direction_change_record
    change_id: stage5ac-bounded-p56-parity-preflight
    date_or_stage: stage-5ac
    previous_direction: Use the repaired Stage 5AB source-of-truth gate to decide whether Stage 5AA synthetic CUDA parity can safely feed a bounded p56 follow-up.
    new_direction: Select Stage 5AD bounded p56 CUDA parity run as the next Codex prompt, scoped exactly to the Stage 5Z bounded p56 validation vector and excluding full p56, unsolved pages, scored experiments, benchmarks, generated-body publication, website expansion, method-status upgrades, and solve claims.
    reason: Stage 5AA synthetic parity passed and Stage 5AC doc-staleness validation confirmed Stage 5AB operational docs were clean, so the only approved future execution scope is the preflighted bounded p56 vector.
    source: Stage 5AC parity-reporting summary, bounded-p56 preflight record, doc-staleness validation record, and next-stage decision records.
    affected_docs: [docs/roadmap/staged-plan.md, README.md, STATUS.md, ROADMAP.md, AGENTS.md, CUDA_NOTES.md, BENCHMARKS.md, EXPERIMENTS.md, RESULTS_SCHEMA.md, TESTING.md, CIPHER_CATALOG.md]
    notes: Stage 5AC itself remains compact reporting/preflight infrastructure and did not execute CUDA or p56.
  - record_type: project_direction_change_record
    change_id: stage5ad-bounded-p56-mismatch-investigation
    date_or_stage: stage-5ad
    previous_direction: If bounded p56 CUDA matched Stage 5X, proceed to Stage 5AE reporting and full-p56/source-expansion gates.
    new_direction: Select Stage 5AD-fix bounded p56 CUDA parity mismatch investigation before any reporting or expansion gate.
    reason: The exact bounded p56 CUDA vector ran but produced hash `6034fe2431159615449db79c36869236d306768414038314d47d6d57d9ae7387`, which does not match the Stage 5X expected hash `4a3059f12c0f8450bd4ef7e31bf879fbc104202e5fb0e53b7ba514241f07cd87`.
    source: Stage 5AD run, parity, summary, device-subset audit, and next-stage decision records.
    affected_docs: [docs/roadmap/staged-plan.md, README.md, STATUS.md, ROADMAP.md, AGENTS.md, CUDA_NOTES.md, BENCHMARKS.md, EXPERIMENTS.md, RESULTS_SCHEMA.md, TESTING.md, CIPHER_CATALOG.md]
    notes: Full p56, unsolved pages, benchmarks, scored experiments, website expansion, generated-body publication, method-status upgrades, and solve claims remain blocked.
  - record_type: project_direction_change_record
    change_id: stage5ad-fix-corrected-formula-reporting
    date_or_stage: stage-5ad-fix
    previous_direction: Decide whether the bounded p56 CUDA mismatch requires CUDA kernel repair, hash-material policy repair, or another diagnostic follow-up.
    new_direction: Select Stage 5AE corrected bounded p56 CUDA formula parity reporting and reference-contract repair, while preserving Stage 5AD as a historical failed-hash record.
    reason: Stage 5AD-fix shows that hash 6034fe2431159615449db79c36869236d306768414038314d47d6d57d9ae7387 matches the Stage 5X formula hash and Stage 5AD CUDA/formula hash, while hash 4a3059f12c0f8450bd4ef7e31bf879fbc104202e5fb0e53b7ba514241f07cd87 is linked to Stage 5L/5X reference hash material.
    source: Stage 5AD-fix hash-lineage, formula-trace, hash-material, reference-contract, root-cause, repair-readiness, guardrail, next-stage-decision, and summary records.
    affected_docs: [docs/roadmap/staged-plan.md, README.md, STATUS.md, ROADMAP.md, AGENTS.md, CUDA_NOTES.md, BENCHMARKS.md, EXPERIMENTS.md, RESULTS_SCHEMA.md, TESTING.md, CIPHER_CATALOG.md]
    notes: CUDA kernel repair is not selected; reference-contract and hash-material policy repair are selected. Full p56, unsolved pages, benchmarks, scored experiments, website expansion, generated-body publication, method-status upgrades, and solve claims remain blocked.
  - record_type: project_direction_change_record
    change_id: stage5ae-archive-visual-numeric-source-lock
    date_or_stage: stage-5ae
    previous_direction: Complete corrected formula parity reporting after Stage 5AD-fix, then consider whether CUDA/full-p56 expansion or source-lock cleanup is appropriate.
    new_direction: Select Stage 5AF archive visual numeric source-lock and provenance inventory before any expansion, full-p56 CUDA, scored experiment, benchmark, or website work.
    reason: Stage 5AE repaired the corrected formula-parity/hash-material reporting boundary, but archive visual numeric provenance still needs source-lock inventory before downstream evidence or manifest planning can be trusted.
    source: Stage 5AE formula parity report, reference-contract repair, hash-material policy, archive-source-lock deferral, next-stage decision, and summary records.
    affected_docs: [docs/roadmap/staged-plan.md, README.md, STATUS.md, ROADMAP.md, AGENTS.md, CUDA_NOTES.md, BENCHMARKS.md, EXPERIMENTS.md, RESULTS_SCHEMA.md, TESTING.md, CIPHER_CATALOG.md]
    notes: Stage 5AE did not run CUDA, modify CUDA source, add kernels, run full p56, run unsolved pages, benchmark, execute scored experiments, process raw/archive data, publish generated bodies, expand the website, upgrade method status, or make solve claims.
  - record_type: project_direction_change_record
    change_id: stage5af-local-source-harvester-inventory
    date_or_stage: stage-5af
    previous_direction: Build source-lock/provenance tooling after Stage 5AE, then decide whether Deep Research, experiments, benchmarks, CUDA, or website work should follow.
    new_direction: Select Stage 5AG local user-provided download source-lock inventory, keeping Deep Research deferred until a harvested/source-locked bundle exists and keeping scored experiments, benchmarks, unsolved-page CUDA, and website expansion rejected for the next step.
    reason: Stage 5AF validates the local-only source harvester and manifest cleanly but does not yet have harvested local raw material source-locked into compact metadata.
    source: Stage 5AF source manifest, harvest-tool policy, dry-run summary, next-stage decision, and aggregate summary records.
    affected_docs: [docs/roadmap/staged-plan.md, README.md, STATUS.md, ROADMAP.md, AGENTS.md, CUDA_NOTES.md, EXPERIMENTS.md, RESULTS_SCHEMA.md, TESTING.md, CIPHER_CATALOG.md, docs/onboarding/source-harvester-workflow.md]
    notes: Google Drive is not a project storage location; user-provided Google/Dropbox/Colab exports must be local and ignored. Stage 5AF did not run broad scraping, process raw archives, run CUDA, benchmark, execute scored experiments, expand the website, or make solve claims.
  - record_type: project_direction_change_record
    change_id: stage5ag-curated-local-extraction-next
    date_or_stage: stage-5ag
    previous_direction: Run the source harvester on user-provided local downloads and decide whether Deep Research, source-lock gap closure, scored experiments, benchmarks, CUDA, or website work should follow.
    new_direction: Select Stage 5AH curated research bundle extraction from local source inventory, keeping Deep Research deferred until curated extracted bundles exist and keeping scored experiments, benchmarks, unsolved-page CUDA, online fetching, and website expansion rejected for the next step.
    reason: Stage 5AG found local third-party material and partial bundle readiness, but the source material needs bounded curated extraction metadata before Deep Research or any hypothesis-facing work can be trusted.
    source: Stage 5AG local source inventory, manifest linkage, source-lock candidate, gap report, research-bundle readiness, guardrail, next-stage decision, and summary records.
    affected_docs: [docs/roadmap/staged-plan.md, README.md, STATUS.md, ROADMAP.md, AGENTS.md, EXPERIMENTS.md, RESULTS_SCHEMA.md, TESTING.md, CIPHER_CATALOG.md, docs/onboarding/source-harvester-workflow.md, docs/onboarding/local-source-inventory-workflow.md]
    notes: Stage 5AG did not run network fetches, online clones, Google Drive storage, Deep Research, CUDA, benchmarks, scored experiments, website expansion, source interpretation, raw source commits, or solve claims.
  - record_type: project_direction_change_record
    change_id: stage5ah-doc-staleness-before-extraction
    date_or_stage: stage-5ah
    previous_direction: Proceed from Stage 5AG directly into Stage 5AH curated research bundle extraction from local source inventory.
    new_direction: Repair operational documentation staleness and stage-ledger coverage first, then requeue curated local extraction as Stage 5AI.
    reason: The README stage ledger and mutable operational docs could silently stop at old stages such as Stage 5N, creating stale current/next-stage context before extraction work.
    source: User Stage 5AH direction, Stage 5AH stage-ledger report, operational-file-map coverage report, current/next-stage consistency report, and summary records.
    affected_docs: [README.md, STATUS.md, ROADMAP.md, AGENTS.md, EXPERIMENTS.md, RESULTS_SCHEMA.md, TESTING.md, CIPHER_CATALOG.md, docs/roadmap/staged-plan.md, docs/onboarding/operational-file-map.md, docs/onboarding/source-of-truth-map.md, docs/onboarding/codex-navigation-map.md, docs/onboarding/source-harvester-workflow.md, docs/onboarding/local-source-inventory-workflow.md]
    notes: Stage 5AH did not process raw third-party sources, fetch from the network, clone online repositories, use Google Drive storage, run Deep Research, execute CUDA, benchmark, run scored experiments, expand the website, or make solve claims.
