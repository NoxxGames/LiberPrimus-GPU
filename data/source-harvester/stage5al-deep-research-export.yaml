do_not_assume_summary:
- Metadata-only website ingest is not public publication.
- Private Deep Research readiness is not source truth or solve evidence.
- Community claims require source locks, transcript policy, coordinate policy, and
  null controls before tests.
- Raw third-party files and generated extract bodies remain ignored and uncommitted.
- No CUDA, benchmarks, scored experiments, OCR, AI/ML interpretation, image forensics,
  or stego/audio execution occurred.
known_questions_summary:
- Which Stage 5AI/5AJ/5AK source cards are reliable enough for future public metadata
  display?
- Which missing source records block reliability review?
- Which community number facts are post-hoc and need null-control framing?
- 'Prioritise missing-source reliability review for: chapterized_rune_map_google_doc,
  chapterized_rune_map_google_doc, cicada_boards_forum, cicada_solvers_iddqd, cicada_solvers_isitcicada_repo'
recommended_citation_policy: Cite source_id, stage record path, publication gate,
  and source-lock status; do not cite raw ignored bodies.
recommended_first_report_prompt_title: Stage 5AM - Deep Research source inventory
  and reliability prompt
what_not_to_analyze_yet:
- Do not perform OCR, image interpretation, stego/audio extraction, CUDA execution,
  or scored experiments.
- Do not treat private community claims as verified facts or solve evidence.
- Do not publish raw third-party files or generated extract bodies.
