name: Bug report
description: Report a reproducible defect in repository code, docs, scripts, or tests.
title: "Bug: "
labels: ["testing"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, platform, and relevant commit hash. Do not paste secrets or raw corpus dumps.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and provenance impact
      description: Note whether raw data, generated outputs, or canonical-status fields are involved.
